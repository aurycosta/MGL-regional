<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Regional - Full Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .bg-executado { background-color: #2d6a4f; color: white; }
        .bg-nao-executado { background-color: #bc4749; color: white; }
        .bg-justificado { background-color: #ee9b00; color: white; }
        .bg-fds { background-color: #e5e7eb; color: #9ca3af; cursor: not-allowed !important; }
        th, td { border: 1px solid #9ca3af; text-align: center; padding: 5px; font-size: 11px; min-width: 28px; height: 32px; }
        .nome-loja { text-align: left; padding-left: 8px; font-weight: bold; background-color: #f5dd7c; min-width: 170px; font-size: 14px; position: relative; }
        .btn-delete { color: #bc4749; cursor: pointer; margin-right: 8px; font-size: 14px; display: inline-block; transition: transform 0.2s; }
        .btn-delete:hover { transform: scale(1.3); color: black; }
        .titulo-regional { background-color: #1b4332; color: white; padding: 10px; font-weight: 500; text-transform: uppercase; font-size: 20px; }
        .hidden-store { display: none !important; }
        .coluna-meta { font-size: 16px !important; font-weight: 900 !important; background-color: #f8fafc; min-width: 60px; }
        #capture-area { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; border: 1px solid #cbd5e1; }
        .scroll-container { flex-grow: 1; overflow-y: auto; padding: 5px; background: white; }
        .tab-active { border-bottom: 4px solid #1b4332; color: #1b4332; font-weight: 900; }
        #loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1b4332; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-2">

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <b class="text-blue-800">Sincronizando Dados Regional...</b>
    </div>

    <div class="flex-none mb-2 flex justify-between items-center bg-white p-3 rounded shadow-md">
        <div class="flex gap-4">
            <button onclick="switchTab('MGL')" id="btn-MGL" class="px-4 py-2 uppercase text-sm tab-active">📊 MGL</button>
            <button onclick="switchTab('QUEBRA')" id="btn-QUEBRA" class="px-4 py-2 uppercase text-sm">📉 Quebra Diária</button>
            <button onclick="switchTab('MESA')" id="btn-MESA" class="px-4 py-2 uppercase text-sm">🔥 Mesa Quente</button>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="addNewStore()" class="bg-green-700 text-white px-3 py-1 rounded text-xs font-bold shadow hover:bg-green-800">+ NOVA LOJA</button>
            <div class="flex items-center gap-2 bg-gray-100 p-2 rounded border border-gray-300">
                <span class="text-[10px] font-bold uppercase text-gray-600">Sábados:</span>
                <label class="switch">
                    <input type="checkbox" id="fdsToggle" onchange="toggleFds()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="capture-area" class="bg-white shadow-2xl rounded-lg overflow-hidden border border-gray-400">
        <div class="flex-none bg-[#89d5f3] p-4 border-b-2 border-black flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 id="main-title" class="text-2xl font-black text-black uppercase italic tracking-tight">MGL</h1>
                <div class="flex gap-4 mt-2 text-[10px] font-bold uppercase">
                    <span class="flex items-center gap-1"><div class="w-10 h-6 bg-executado border border-black/20"></div> EXECUTADO</span>
                    <span class="flex items-center gap-1"><div class="w-10 h-6 bg-nao-executado border border-black/20"></div> PENDENTE</span>
                    <span class="flex items-center gap-1"><div class="w-10 h-6 bg-justificado border border-black/20"></div> JUSTIFICADO</span>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 items-end">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold">MÊS DE REFERÊNCIA</label>
                    <input type="month" id="monthPicker" class="border-2 border-black p-1 text-sm font-bold">
                </div>
                <button onclick="takeScreenshot()" class="bg-blue-600 text-white px-3 py-2 text-xs rounded font-bold shadow-md hover:bg-blue-700">📸 PRINT</button>
                <button onclick="generatePDF()" class="bg-red-700 text-white px-3 py-2 text-xs rounded font-bold shadow-md hover:bg-red-800">📄 PDF</button>
                <button onclick="showAllStores()" class="bg-gray-600 text-white px-3 py-2 text-xs rounded font-bold">👁 MOSTRAR OCULTAS</button>
            </div>
        </div>

        <div class="scroll-container space-y-4">
            <section class="border border-gray-400 shadow-sm">
                <div class="titulo-regional flex justify-between"><span>Regional Claudio</span><span id="meta-claudio" class="text-yellow-400 font-bold">MÉDIA: 0%</span></div>
                <div class="overflow-x-auto"><table class="w-full border-collapse"><thead class="bg-gray-50"><tr id="header-claudio"></tr></thead><tbody id="body-claudio"></tbody></table></div>
            </section>
            <section class="border border-gray-400 shadow-sm">
                <div class="titulo-regional flex justify-between"><span>Regional Lekssey</span><span id="meta-lekssey" class="text-yellow-400 font-bold">MÉDIA: 0%</span></div>
                <div class="overflow-x-auto"><table class="w-full border-collapse"><thead class="bg-gray-50"><tr id="header-lekssey"></tr></thead><tbody id="body-lekssey"></tbody></table></div>
            </section>
        </div>

        <div id="dashCards" class="flex-none grid grid-cols-2 md:grid-cols-4 gap-2 py-1 px-3 bg-slate-900 text-white border-t-4 border-yellow-500"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByJCKoT9xEYJp_gTflGTg1GxtwSth-CEA",
            authDomain: "gestao-regional-d7b82.firebaseapp.com",
            projectId: "gestao-regional-d7b82",
            databaseURL: "https://gestao-regional-d7b82-default-rtdb.firebaseio.com/",
            storageBucket: "gestao-regional-d7b82.firebasestorage.app",
            messagingSenderId: "846157242095",
            appId: "1:846157242095:web:3143dff79207303ccec51a"
        };

        const app = initializeApp(firebaseConfig);
        const rdb = getDatabase(app);

        const LOJAS_INICIAIS = {
            claudio: ["001-AFL", "002-APIACAS", "003-PAR", "010-GTA", "011-PEIXOTO", "015-TNN", "502-CA-GTA-C", "503-CA-SNP-J", "506-CA-SNP-A", "508-CA-MTP-I"],
            lekssey: ["004-SORBH", "005-LRVCEN", "006-MUTUM", "008-LRVVEN", "009-TAPURAH", "012-SORBR","013-DNSOR","016-DNMUTUM", "018-SOR-RDS", "505-CA-SORRI"]
        };

        window.currentTab = 'MGL';
        window.currentMonthKey = new Date().toISOString().substring(0, 7);
        window.db = { MGL: {}, QUEBRA: {}, MESA: {} };
        window.hiddenStoresData = { MGL: [], QUEBRA: [], MESA: [] };
        window.fdsSettings = { MGL: false, QUEBRA: false, MESA: false };

        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 5000);

        onValue(ref(rdb, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            window.db = data.data || { MGL: {}, QUEBRA: {}, MESA: {} };
            window.hiddenStoresData = data.hiddenStores || { MGL: [], QUEBRA: [], MESA: [] };
            window.fdsSettings = data.settings?.fds || { MGL: false, QUEBRA: false, MESA: false };
            
            document.getElementById('fdsToggle').checked = window.fdsSettings[window.currentTab] || false;
            checkMonthStructure();
            renderAll();
            document.getElementById('loading-overlay').style.display = 'none';
        });

        function sortStores(storesArray) {
            return storesArray.sort((a, b) => {
                const numA = parseInt(a.name.split('-')[0]) || 999;
                const numB = parseInt(b.name.split('-')[0]) || 999;
                return numA - numB;
            });
        }

        window.switchTab = (tabName) => {
            window.currentTab = tabName;
            document.getElementById('fdsToggle').checked = window.fdsSettings[tabName] || false;
            const titles = { 'MGL': 'Minha Gestão de Loja (MGL)', 'QUEBRA': 'Quebra Diária', 'MESA': 'Mesa Quente' };
            document.getElementById('main-title').innerText = titles[tabName];
            ['MGL', 'QUEBRA', 'MESA'].forEach(t => document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tabName));
            checkMonthStructure();
            renderAll();
        };

        window.changeMonth = () => {
            window.currentMonthKey = document.getElementById('monthPicker').value;
            checkMonthStructure();
            renderAll();
        };

        function checkMonthStructure() {
            if (!window.db[window.currentTab]) window.db[window.currentTab] = {};
            if (!window.db[window.currentTab][window.currentMonthKey]) {
                const base = { claudio: [], lekssey: [] };
                let lastMonthKey = Object.keys(window.db[window.currentTab]).sort().reverse()[0];
                let sourceClaudio = lastMonthKey ? window.db[window.currentTab][lastMonthKey].claudio.map(l => l.name) : LOJAS_INICIAIS.claudio;
                let sourceLekssey = lastMonthKey ? window.db[window.currentTab][lastMonthKey].lekssey.map(l => l.name) : LOJAS_INICIAIS.lekssey;

                sourceClaudio.forEach(n => base.claudio.push({ name: n, status: {} }));
                sourceLekssey.forEach(n => base.lekssey.push({ name: n, status: {} }));
                set(ref(rdb, `data/${window.currentTab}/${window.currentMonthKey}`), base);
            }
        }

        window.addNewStore = () => {
            const name = prompt("Nome da Nova Unidade (Ex: 020-NOVALOJA):");
            if (!name) return;
            const reg = prompt("Para qual Regional? (1 para Claudio, 2 para Lekssey):");
            const regionKey = reg === "1" ? "claudio" : "lekssey";
            if (regionKey) {
                const currentList = window.db[window.currentTab][window.currentMonthKey][regionKey] || [];
                currentList.push({ name: name.toUpperCase(), status: {} });
                set(ref(rdb, `data/${window.currentTab}/${window.currentMonthKey}/${regionKey}`), currentList);
            }
        };

        // NOVA FUNÇÃO: EXCLUIR LOJA
        window.deleteStore = (region, storeName) => {
            if (confirm(`⚠️ TEM CERTEZA que deseja EXCLUIR a loja ${storeName}?\nTodos os dados deste mês serão perdidos.`)) {
                let currentList = window.db[window.currentTab][window.currentMonthKey][region];
                const newList = currentList.filter(s => s.name !== storeName);
                set(ref(rdb, `data/${window.currentTab}/${window.currentMonthKey}/${region}`), newList);
            }
        };

        window.renderAll = () => {
            renderTable('claudio');
            renderTable('lekssey');
            updateDashboard();
        };

        function renderTable(region) {
            const body = document.getElementById(`body-${region}`);
            const header = document.getElementById(`header-${region}`);
            const [year, month] = window.currentMonthKey.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const allowSat = window.fdsSettings[window.currentTab];
            
            header.innerHTML = `<th class="nome-loja">EMPRESA</th>` + Array.from({length: daysInMonth}, (_, i) => {
                const d = new Date(year, month - 1, i + 1).getDay();
                let colorClass = d === 0 || (d === 6 && !allowSat) ? 'bg-fds' : 'bg-white';
                return `<th class="${colorClass}">${d===0?'D':d===6?'S':i+1}</th>`;
            }).join('') + `<th class="bg-yellow-200">META%</th>`;
            
            body.innerHTML = '';
            let regionalSum = 0;
            let tabDataRaw = window.db[window.currentTab]?.[window.currentMonthKey];
            if (!tabDataRaw || !tabDataRaw[region]) return;

            const sortedStores = sortStores([...tabDataRaw[region]]);

            sortedStores.forEach((store) => {
                const isHidden = (window.hiddenStoresData[window.currentTab] || []).includes(store.name);
                const tr = document.createElement('tr');
                if (isHidden) tr.className = 'hidden-store';

                let wd = 0, red = 0;
                // Coluna da loja com botão de exclusão
                let cells = `
                    <td class="nome-loja">
                        <span class="btn-delete" onclick="deleteStore('${region}', '${store.name}')" title="Excluir Loja">🗑️</span>
                        <span onclick="toggleStoreVisibility('${store.name}')">${store.name}</span>
                    </td>`;
                
                for (let i = 1; i <= daysInMonth; i++) {
                    const dw = new Date(year, month - 1, i).getDay();
                    const st = store.status?.[i] || {};
                    let c = 'bg-white';
                    if (dw === 0 || (dw === 6 && !allowSat)) c = 'bg-fds';
                    if (st.type === 'G') c = 'bg-executado';
                    if (st.type === 'R') { c = 'bg-nao-executado'; red++; }
                    if (st.type === 'Y') c = 'bg-justificado';
                    if (dw !== 0 && (dw !== 6 || allowSat)) wd++;
                    cells += `<td class="${c} cursor-pointer" onclick="toggle('${region}', '${store.name}', ${i})"></td>`;
                }
                const meta = wd > 0 ? Math.round(100 - ((red/wd)*100)) : 100;
                regionalSum += meta;
                tr.innerHTML = cells + `<td class="coluna-meta ${meta < 100 ? 'text-red-600' : 'text-green-700'}">${meta}%</td>`;
                body.appendChild(tr);
            });
            document.getElementById(`meta-${region}`).innerText = `MÉDIA: ${Math.round(regionalSum / (sortedStores.length || 1))}%`;
        }

        window.toggle = (region, storeName, day) => {
            const [year, month] = window.currentMonthKey.split('-').map(Number);
            const dw = new Date(year, month - 1, day).getDay();
            if (dw === 0 || (dw === 6 && !window.fdsSettings[window.currentTab])) return;
            
            const storesList = window.db[window.currentTab][window.currentMonthKey][region];
            const sIdx = storesList.findIndex(s => s.name === storeName);
            const store = storesList[sIdx];
            
            const currentObj = store.status?.[day] || { type: undefined };
            let nextType, qty = 0, reason = "";

            if (!currentObj.type) nextType = 'G';
            else if (currentObj.type === 'G') {
                nextType = 'R';
                qty = prompt("Qtd itens não feitos:") || 0;
                reason = prompt("Motivo:") || "";
            } else if (currentObj.type === 'R') {
                nextType = 'Y';
                reason = prompt("Justificativa:") || "";
            } else nextType = null;

            set(ref(rdb, `data/${window.currentTab}/${window.currentMonthKey}/${region}/${sIdx}/status/${day}`), nextType ? { type: nextType, qty, reason } : null);
        };

        window.toggleFds = () => {
            const isChecked = document.getElementById('fdsToggle').checked;
            set(ref(rdb, `settings/fds/${window.currentTab}`), isChecked);
        };

        window.showAllStores = () => { set(ref(rdb, `hiddenStores/${window.currentTab}`), []); };

        window.toggleStoreVisibility = (name) => {
            let list = [...(window.hiddenStoresData[window.currentTab] || [])];
            if (list.includes(name)) list = list.filter(n => n !== name);
            else if(confirm(`Ocultar ${name}?`)) list.push(name);
            set(ref(rdb, `hiddenStores/${window.currentTab}`), list);
        };

        function updateDashboard() {
            const tabData = window.db[window.currentTab]?.[window.currentMonthKey];
            if (!tabData) return;
            const allStores = [...(tabData.claudio || []), ...(tabData.lekssey || [])];
            const allowSat = window.fdsSettings[window.currentTab];
            let totalRed = 0, sumMeta = 0, bestStore = {name: '-', meta: -1}, worstStore = {name: '-', meta: 101};
            
            allStores.forEach(s => {
                let red = 0, wd = 0;
                const days = new Date(...window.currentMonthKey.split('-'), 0).getDate();
                for(let i=1; i<=days; i++) {
                    const dw = new Date(...window.currentMonthKey.split('-').map((v,idx)=>idx===1?v-1:v), i).getDay();
                    if (dw !== 0 && (dw !== 6 || allowSat)) {
                        wd++;
                        if(s.status?.[i]?.type === 'R') { red++; totalRed++; }
                    }
                }
                const meta = wd > 0 ? Math.round(100 - ((red/wd)*100)) : 100;
                sumMeta += meta;
                if(meta > bestStore.meta) bestStore = {name: s.name, meta};
                if(meta < worstStore.meta) worstStore = {name: s.name, meta};
            });

            document.getElementById('dashCards').innerHTML = `
                <div class="bg-slate-800 p-3 border-l-4 border-green-500 rounded"><p class="text-[10px] text-green-400 font-bold">DESTAQUE</p><p class="text-lg font-black truncate">${bestStore.name} (${bestStore.meta}%)</p></div>
                <div class="bg-slate-800 p-3 border-l-4 border-red-500 rounded"><p class="text-[10px] text-red-400 font-bold">ALERTA</p><p class="text-lg font-black truncate">${worstStore.name} (${worstStore.meta}%)</p></div>
                <div class="bg-slate-800 p-3 border-l-4 border-blue-500 rounded text-center"><p class="text-[10px] text-blue-400 font-bold">MÉDIA GERAL</p><p class="text-xl font-black">${Math.round(sumMeta/(allStores.length||1))}%</p></div>
                <div class="bg-slate-800 p-3 border-l-4 border-yellow-500 rounded text-center"><p class="text-[10px] text-yellow-400 font-bold">TOTAL PENDÊNCIAS</p><p class="text-xl font-black">${totalRed}</p></div>
            `;
        }

        window.takeScreenshot = async () => {
            const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2 });
            const link = document.createElement('a');
            link.download = `Relatorio_${window.currentMonthKey}.png`;
            link.href = canvas.toDataURL();
            link.click();
        };

        window.generatePDF = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const tabData = window.db[window.currentTab][window.currentMonthKey];
            const allowSat = window.fdsSettings[window.currentTab];
            doc.setFontSize(18);
            doc.text(`Relatório de Gestão - ${window.currentTab} - ${window.currentMonthKey}`, 14, 20);
            const rows = [];
            const allSorted = sortStores([...tabData.claudio, ...tabData.lekssey]);
            allSorted.forEach(s => {
                let red = 0, wd = 0, vol = 0;
                const days = new Date(...window.currentMonthKey.split('-'), 0).getDate();
                for(let i=1; i<=days; i++) {
                    const dw = new Date(...window.currentMonthKey.split('-').map((v,idx)=>idx===1?v-1:v), i).getDay();
                    if (dw !== 0 && (dw !== 6 || allowSat)) {
                        wd++;
                        if(s.status?.[i]?.type === 'R') { red++; vol += parseFloat(s.status[i].qty || 0); }
                    }
                }
                const meta = wd > 0 ? Math.round(100 - ((red/wd)*100)) : 100;
                rows.push([s.name, `${meta}%`, red, vol]);
            });
            doc.autoTable({ startY: 30, head: [['Loja', 'Meta %', 'Dias Pendentes', 'Volume Pendente']], body: rows });
            doc.save(`Gestao_${window.currentTab}.pdf`);
        };

        document.getElementById('monthPicker').value = window.currentMonthKey;
        document.getElementById('monthPicker').onchange = window.changeMonth;
    </script>
</body>
</html>
